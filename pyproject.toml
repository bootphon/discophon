[dependency-groups]
dev = [
  "ipykernel>=7.1.0",
  "ruff>=0.14.5",
  "ty>=0.0.1a26",
  "typos>=1.39.2",
]
plot = [
  "altair>=6.0.0",
  "matplotlib>=3.10.7",
  "seaborn>=0.13.2",
  "vegafusion>=2.0.3",
  "vl-convert-python>=1.8.0",
]

[tool.ruff]
line-length = 119

[tool.ruff.lint]
select = ["E", "F", "I", "W", "RUF"]

[tool.ruff.lint.pylint]
allow-magic-value-types = ["int", "str"]
max-args = 10

[tool.uv.workspace]
members = [
  "baselines",
  "builder",
  "core",
  "evaluate",
  "prepare",
  "submission",
]

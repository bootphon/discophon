[project]
site_name = "DiscoPhon"
site_description = "The Phoneme Discovery Benchmark."
site_author = "CoML"
site_url = "https://benchmarks.cognitive-ml.fr/discophon/"
copyright = """
Copyright &copy; 2026 CoML
"""
nav = [
  { "Home" = "index.md" },
  { "Benchmark" = [
    "benchmark/index.md",
    "benchmark/datasets.md",
    "benchmark/phonemes.md",
    "benchmark/tasks.md",
  ] },
  { "Leaderboard" = [
    "leaderboard/index.md",
    "leaderboard/results.md",
  ] },
  { "Docs" = [
    "docs/index.md",
    "docs/prepare.md",
    "docs/baselines.md",
    "docs/evaluate.md",
    "docs/submission.md",
  ] }
]
extra_javascript = [
  "javascripts/katex.js",
  "https://unpkg.com/katex@0/dist/katex.min.js",
  "https://unpkg.com/katex@0/dist/contrib/auto-render.min.js"
]
extra_css = [
  "stylesheets/extra.css",
  "https://unpkg.com/katex@0/dist/katex.min.css",
]

[project.theme]
# favicon = "assets/favicon.png"
# logo = "assets/logo.png"
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tooltips",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/regular/file-lines"
link = "https://arxiv.org"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/bootphon/discophon"
